name: Live API Tests

# Live-Tests gegen entscheidsuche.ch — getrennt von der PR-CI (OPS-001).
# Nächtlich + manuell auslösbar, nie blockierend für PRs.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  live:
    name: Live tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run live tests
        run: PYTHONPATH=src pytest tests/ -m live -v
