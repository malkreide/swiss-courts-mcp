<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252545"/>
      <stop offset="100%" stop-color="#1e1e3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="720" height="480" fill="url(#bg)" rx="12"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="40" fill="#0f0f23" rx="12"/>
  <rect x="0" y="20" width="720" height="20" fill="#0f0f23"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <text x="360" y="25" text-anchor="middle" fill="#8888aa" font-family="monospace" font-size="12">Claude Desktop — swiss-courts-mcp</text>
  
  <!-- User message -->
  <rect x="20" y="55" width="680" height="35" fill="#2a2a4a" rx="8"/>
  <text x="35" y="77" fill="#cc99ff" font-family="monospace" font-size="13" font-weight="bold">User:</text>
  <text x="80" y="77" fill="#e0e0e0" font-family="monospace" font-size="13">Finde Bundesgerichtsentscheide zum Datenschutzgesetz</text>
  
  <!-- Tool call -->
  <rect x="20" y="100" width="680" height="55" fill="url(#card)" rx="8" stroke="#7c3aed" stroke-width="1"/>
  <text x="35" y="120" fill="#a78bfa" font-family="monospace" font-size="11">⚡ Tool Call: search_bger_decisions</text>
  <text x="35" y="140" fill="#6b7280" font-family="monospace" font-size="11">{"query": "Datenschutzgesetz", "limit": 5}</text>
  
  <!-- Response header -->
  <rect x="20" y="165" width="680" height="30" fill="#1a3a2a" rx="8"/>
  <text x="35" y="185" fill="#34d399" font-family="monospace" font-size="12">✓ Bundesgericht: «Datenschutzgesetz» — 847 Treffer (5 angezeigt)</text>
  
  <!-- Result 1 -->
  <rect x="20" y="205" width="680" height="70" fill="#252545" rx="6"/>
  <text x="35" y="225" fill="#60a5fa" font-family="monospace" font-size="12" font-weight="bold">1. Bundesgericht — I. öffentlich-rechtliche Abteilung</text>
  <text x="35" y="245" fill="#9ca3af" font-family="monospace" font-size="11">Datum: 2025-03-15  |  Referenz: 1C_234/2024</text>
  <text x="35" y="265" fill="#d1d5db" font-family="monospace" font-size="11">Anwendung von Art. 25 DSG — Auskunftsrecht gegenüber Bundesorganen</text>
  
  <!-- Result 2 -->
  <rect x="20" y="285" width="680" height="70" fill="#252545" rx="6"/>
  <text x="35" y="305" fill="#60a5fa" font-family="monospace" font-size="12" font-weight="bold">2. Bundesgericht — II. öffentlich-rechtliche Abteilung</text>
  <text x="35" y="325" fill="#9ca3af" font-family="monospace" font-size="11">Datum: 2025-02-28  |  Referenz: 2C_567/2024</text>
  <text x="35" y="345" fill="#d1d5db" font-family="monospace" font-size="11">Verhältnismässigkeit der Datenbearbeitung nach Art. 6 DSG</text>
  
  <!-- Result 3 -->
  <rect x="20" y="365" width="680" height="70" fill="#252545" rx="6"/>
  <text x="35" y="385" fill="#60a5fa" font-family="monospace" font-size="12" font-weight="bold">3. Bundesgericht — I. zivilrechtliche Abteilung</text>
  <text x="35" y="405" fill="#9ca3af" font-family="monospace" font-size="11">Datum: 2025-01-20  |  Referenz: 4A_890/2024</text>
  <text x="35" y="425" fill="#d1d5db" font-family="monospace" font-size="11">Persönlichkeitsverletzung durch rechtswidrige Datenbearbeitung</text>
  
  <!-- Footer -->
  <text x="35" y="460" fill="#6b7280" font-family="monospace" font-size="10">Quelle: entscheidsuche.ch — Schweizer Gerichtsentscheide</text>
  <text x="575" y="460" fill="#7c3aed" font-family="monospace" font-size="10">swiss-courts-mcp v0.1.0</text>
</svg>